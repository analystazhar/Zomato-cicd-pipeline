<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zomato UI Clone</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="logo">ZomatoClone</div>
  <div class="nav-links">
    <a href="#">Login</a>
    <a href="#">Sign Up</a>
  </div>
</nav>

<!-- Hero Section -->
<section class="hero">
  <h1>Discover the best food & drinks</h1>
  <div class="search-box">
    <input type="text" placeholder="Search for restaurant, cuisine or dish">
  </div>
</section>

<!-- Categories -->
<section class="categories">
  <div class="category">🍕 Pizza</div>
  <div class="category">🍔 Burgers</div>
  <div class="category">🍛 Indian</div>
  <div class="category">🍣 Sushi</div>
  <div class="category">🥗 Healthy</div>
</section>

<!-- Filters -->
<section class="filters">
  <button>Filters</button>
  <button>Rating 4.0+</button>
  <button>Fast Delivery</button>
  <button>Pure Veg</button>
</section>

<!-- Restaurant Cards -->
<section class="restaurants">

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?pizza">
    <div class="card-content">
      <h3>Pizza Hut</h3>
      <p>⭐ 4.3 • 30 mins</p>
      <p class="price">₹300 for one</p>
    </div>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?burger">
    <div class="card-content">
      <h3>Burger King</h3>
      <p>⭐ 4.1 • 25 mins</p>
      <p class="price">₹200 for one</p>
    </div>
  </div>

  <div class="card">
    <img src="https://source.unsplash.com/400x300/?indian-food">
    <div class="card-content">
      <h3>Spice Villa</h3>
      <p>⭐ 4.5 • 40 mins</p>
      <p class="price">₹350 for one</p>
    </div>
  </div>

</section>

<footer>
  <p>© 2026 Zomato Clone</p>
</footer>

</body>
</html>
