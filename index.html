<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AWS Console Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>AWS</h2>
  <ul>
    <li class="active">Dashboard</li>
    <li>EC2</li>
    <li>S3</li>
    <li>Lambda</li>
    <li>IAM</li>
  </ul>
</div>

<!-- Main -->
<div class="main">

  <!-- Navbar -->
  <div class="navbar">
    <input type="text" id="search" placeholder="Search AWS services...">
  </div>

  <!-- Services -->
  <div class="services" id="services">

    <div class="card" data-name="ec2 compute server">
      <h3>EC2</h3>
      <p>Virtual Servers</p>
    </div>

    <div class="card" data-name="s3 storage bucket">
      <h3>S3</h3>
      <p>Object Storage</p>
    </div>

    <div class="card" data-name="lambda serverless function">
      <h3>Lambda</h3>
      <p>Serverless Compute</p>
    </div>

    <div class="card" data-name="iam security access">
      <h3>IAM</h3>
      <p>Access Control</p>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
